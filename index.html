<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT GATEWAY // SECURE CHANNEL</title>

    <style>
        :root {
            --bg: #050708;
            --bg-card: #0a0e12;
            --bg-elevated: #0f1419;
            --border: #181d24;
            --border-hover: #222933;
            --text-primary: #cdd3db;
            --text-secondary: #9199a4;
            --text-muted: #5e6670;
            --text-dim: #3d444d;
            --radius-sm: 3px;
            --radius-md: 5px;
            --radius-lg: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;
            -webkit-user-select: none;
            user-select: none;
            padding: 20px;
        }

        /* ============ ФОН ============ */
        .bg-grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.022;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
            background-size: 180px 180px;
        }

        .bg-vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.75) 100%);
        }

        /* ============ КОНТЕЙНЕР ============ */
        .container {
            position: relative;
            z-index: 10;
            width: 420px;
            max-width: 100%;
        }

        /* ============ КАРТОЧКА ============ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow:
                0 16px 48px rgba(0, 0, 0, 0.8),
                0 2px 8px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.015);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow:
                0 16px 52px rgba(0, 0, 0, 0.85),
                0 2px 8px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        /* ============ ФОТО-БЛОК ============ */
        .photo-block {
            width: 100%;
            height: 200px;
            background: #080b0f;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-block img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.7s ease, filter 0.7s ease;
            filter: brightness(0.65) contrast(1.15) saturate(0.5);
        }

        .card:hover .photo-block img {
            transform: scale(1.04);
            filter: brightness(0.7) contrast(1.2) saturate(0.55);
        }

        /* Плейсхолдер */
        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #080b0f 0%, #0f1419 50%, #080b0f 100%);
            position: absolute;
            inset: 0;
        }

        .photo-placeholder .ph-content {
            text-align: center;
            opacity: 0.3;
        }

        .photo-placeholder .ph-icon {
            width: 36px;
            height: 36px;
            margin: 0 auto 8px;
            color: var(--text-dim);
        }

        .photo-placeholder .ph-text {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 55%,
                rgba(5, 7, 8, 0.8) 100%
            );
            pointer-events: none;
            z-index: 2;
        }

        .photo-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 3;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            padding: 4px 9px;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
            pointer-events: none;
        }

        /* ============ BODY КАРТОЧКИ ============ */
        .card-body {
            padding: 28px 24px 22px;
            position: relative;
            text-align: center;
        }

        /* ============ ГЛАЗ ============ */
        .icon-section {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
        }

        .icon-outer {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .icon-outer::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .icon-inner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.01);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.035);
        }

        .icon-eye {
            width: 24px;
            height: 24px;
            color: var(--text-muted);
            opacity: 0.5;
            transition: opacity var(--transition);
        }

        .card:hover .icon-eye {
            opacity: 0.7;
        }

        /* ============ ЗАГОЛОВОК ============ */
        .title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 24px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .subtitle .dot {
            color: var(--text-dim);
            margin: 0 6px;
        }

        /* ============ РАЗДЕЛИТЕЛЬ ============ */
        .divider {
            width: 40px;
            height: 1px;
            background: var(--border);
            margin: 0 auto 22px;
            opacity: 0.6;
        }

        /* ============ КНОПКА ============ */
        .btn-wrapper {
            margin-top: 2px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 22px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                transparent 0%,
                rgba(255, 255, 255, 0.008) 50%,
                transparent 100%
            );
            opacity: 0;
            transition: opacity var(--transition);
        }

        .btn:hover {
            background: #151d24;
            border-color: var(--border-hover);
            color: var(--text-primary);
            box-shadow: 0 0 28px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.09em;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            background: #19222a;
            transition: all 0.05s ease;
            transform: scale(0.985);
        }

        .btn-arrow {
            font-size: 16px;
            transition: transform var(--transition);
            opacity: 0.4;
        }

        .btn:hover .btn-arrow {
            transform: translateX(4px);
            opacity: 0.8;
        }

        .btn-icon {
            width: 15px;
            height: 15px;
            opacity: 0.4;
            flex-shrink: 0;
            transition: opacity var(--transition);
        }

        .btn:hover .btn-icon {
            opacity: 0.75;
        }

        /* ============ ПОДСКАЗКА ============ */
        .hint {
            text-align: center;
            margin-top: 16px;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            opacity: 0.4;
            transition: opacity var(--transition);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .card:hover .hint {
            opacity: 0.6;
        }

        /* ============ FOOTER ============ */
        .card-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 8px;
            letter-spacing: 0.07em;
            color: var(--text-dim);
            text-transform: uppercase;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .footer-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
            animation: dot-pulse 3s ease-in-out infinite;
        }

        @keyframes dot-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* ============ ВНЕШНИЙ ФУТЕР ============ */
        .outer-footer {
            text-align: center;
            margin-top: 14px;
            font-size: 8px;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            opacity: 0.2;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        /* ============ ЧАСТИЦЫ ============ */
        .particles-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }

        .particle {
            position: absolute;
            width: 1px;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: float-up linear infinite;
            opacity: 0;
        }

        @keyframes float-up {
            0% {
                transform: translateY(105vh) translateX(0) scale(0);
                opacity: 0;
            }
            5% { opacity: 0.4; }
            30% { opacity: 0.08; }
            100% {
                transform: translateY(-6vh) translateX(20px) scale(1.3);
                opacity: 0;
            }
        }

        /* ============ АДАПТИВ ============ */
        @media (max-width: 480px) {
            .photo-block {
                height: 160px;
            }
            .card-body {
                padding: 20px 14px 16px;
            }
            .card-footer {
                padding: 8px 12px;
            }
            .btn {
                font-size: 11px;
                padding: 12px 14px;
                letter-spacing: 0.04em;
            }
            .btn:hover {
                letter-spacing: 0.06em;
            }
            .icon-outer {
                width: 60px;
                height: 60px;
            }
            .icon-inner {
                width: 40px;
                height: 40px;
            }
            .icon-eye {
                width: 20px;
                height: 20px;
            }
            .title {
                font-size: 14px;
            }
            .subtitle {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Фон -->
    <div class="bg-grain"></div>
    <div class="bg-vignette"></div>

    <!-- Частицы -->
    <div class="particles-layer" id="particlesLayer"></div>

    <!-- Карточка -->
    <div class="container">
        <div class="card" id="card">

            <!-- ============ ФОТО-БЛОК ============ -->
            <!-- ЗАМЕНИТЕ src НА ПУТЬ К ВАШЕМУ JPG -->
            <div class="photo-block">
                <!-- Если фото есть — раскомментируйте img и удалите photo-placeholder -->
                <!-- <img src="photo.jpg" alt="cover"> -->

                <!-- Плейсхолдер (удалите когда добавите фото) -->
                <div class="photo-placeholder">
                    <div class="ph-content">
                        <svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <div class="ph-text">image.jpg</div>
                    </div>
                </div>

                <div class="photo-overlay"></div>
                <div class="photo-badge">CLASSIFIED</div>
            </div>

            <!-- ============ ТЕЛО КАРТОЧКИ ============ -->
            <div class="card-body">
                <!-- Глаз -->
                <div class="icon-section">
                    <div class="icon-outer">
                        <div class="icon-inner">
                            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Заголовок -->
                <div class="title">Secure Channel</div>
                <div class="subtitle">
                    OSINT<span class="dot">·</span>Gateway
                </div>

                <div class="divider"></div>

                <!-- КНОПКА -->
                <div class="btn-wrapper">
                    <a href="https://t.me/your_channel_username"
                    class="btn"
                    id="redirectBtn"
                    target="_blank"
                    rel="noopener noreferrer">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" y1="2" x2="12" y2="15"/>
                    </svg>
                    Establish Link
                    <span class="btn-arrow">→</span>
                </a>
            </div>

            <p class="hint">Encrypted connection ready</p>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <div class="footer-status">
                <span class="footer-dot"></span>
                <span>Standby</span>
            </div>
            <span>SESSION: <span id="sessionId">—</span></span>
        </div>
    </div>

    <div class="outer-footer">
        wheback // FamIist
    </div>
</div>

<script>
    (function() {
        // ==================== НАСТРОЙКИ ====================
        // ЗАМЕНИТЕ на ссылку вашего Telegram-канала
        var TELEGRAM_LINK = 'https://t.me/famIist';
        // ===================================================

        var btn = document.getElementById('redirectBtn');
        btn.href = TELEGRAM_LINK;

        btn.addEventListener('click', function(e) {
            if (!btn.href || btn.href === '#' || btn.href.indexOf('your_channel_username') !== -1) {
                e.preventDefault();
                alert('⚠️ Замените ссылку в коде на ваш Telegram-канал:\nTELEGRAM_LINK = "https://t.me/ваш_канал"');
                return;
            }
        });

        // Генерация ID сессии
        function randHex(len) {
            var chars = '0123456789abcdef';
            var result = '';
            for (var i = 0; i < len; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return result;
        }
        document.getElementById('sessionId').textContent = randHex(8).toUpperCase();

        // ==================== ЧАСТИЦЫ ====================
        var particlesLayer = document.getElementById('particlesLayer');

        function spawnParticle() {
            var p = document.createElement('div');
            p.className = 'particle';
            var size = Math.random() * 1.6 + 0.5;
            var leftPos = Math.random() * 94;
            var dur = Math.random() * 20 + 10;
            var delay = Math.random() * 7;

            p.style.cssText =
                'left:' + leftPos + '%;' +
                'width:' + size + 'px;' +
                'height:' + size + 'px;' +
                'animation-duration:' + dur + 's;' +
                'animation-delay:' + delay + 's;';

            particlesLayer.appendChild(p);
            setTimeout(function() {
                if (p.parentNode) p.parentNode.removeChild(p);
            }, (dur + delay) * 1000);
        }

        setInterval(spawnParticle, 1100);
        for (var i = 0; i < 8; i++) {
            setTimeout(spawnParticle, i * 450);
        }

        // ==================== 3D-TILT ====================
        var card = document.getElementById('card');

        card.addEventListener('mousemove', function(e) {
            var rect = card.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            var cx = rect.width / 2;
            var cy = rect.height / 2;
            var rotX = ((y - cy) / cy) * -2.2;
            var rotY = ((x - cx) / cx) * 2.2;

            card.style.transform =
                'perspective(750px) rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';
            card.style.transition = 'transform 0.08s ease-out';
        });

        card.addEventListener('mouseleave', function() {
            card.style.transform = 'perspective(750px) rotateX(0deg) rotateY(0deg)';
            card.style.transition = 'transform 0.5s ease';
        });

        // ==================== ВСПЫШКА ПРИ КЛИКЕ ====================
        card.addEventListener('click', function() {
            var flash = document.createElement('div');
            flash.style.cssText =
                'position:fixed;inset:0;background:rgba(255,255,255,0.01);' +
                'pointer-events:none;z-index:999;' +
                'animation:fadeFlash 0.35s ease-out forwards;';
            document.body.appendChild(flash);
            setTimeout(function() { flash.remove(); }, 350);
        });

        var styleEl = document.createElement('style');
        styleEl.textContent = '@keyframes fadeFlash{0%{opacity:1}100%{opacity:0}}';
        document.head.appendChild(styleEl);

        console.log(
            '%c[ gateway ]%c standby · session: ' + randHex(8).toUpperCase(),
            'color:#5e6670;',
            'color:#9199a4;'
        );
        console.log('%c[ link ]%c ' + TELEGRAM_LINK, 'color:#3d444d;', 'color:#5e6670;');
    })();
</script>
</body>
</html>
