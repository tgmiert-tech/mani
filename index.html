<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT GATEWAY // SECURE CHANNEL</title>

    <style>
        :root {
            --bg: #080a0c;
            --bg-elevated: #0d1114;
            --surface: #11161a;
            --surface-hover: #151b20;
            --border: #1a1f24;
            --border-light: #212830;
            --text-primary: #c8cdd2;
            --text-secondary: #8b939c;
            --text-muted: #5a626b;
            --text-dim: #3e454d;
            --accent: #5c6b73;
            --accent-light: #7b8b94;
            --radius-sm: 3px;
            --radius-md: 5px;
            --radius-lg: 7px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ============ ФОН ============ */
        .bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 25%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 25%, transparent 70%);
        }

        .bg-noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
            background-size: 180px 180px;
        }

        /* ============ КОНТЕЙНЕР ============ */
        .container {
            position: relative;
            z-index: 10;
            width: 400px;
            max-width: 93%;
        }

        /* ============ КАРТОЧКА ============ */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.6),
                0 2px 6px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.015);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .card:hover {
            border-color: var(--border-light);
            box-shadow:
                0 8px 36px rgba(0, 0, 0, 0.7),
                0 2px 6px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        /* ============ HEADER ============ */
        .card-header {
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-elevated);
        }

        .header-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
        }

        .header-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .header-spacer {
            flex: 1;
        }

        .header-badge {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 2px 7px;
            text-transform: uppercase;
        }

        /* ============ BODY ============ */
        .card-body {
            padding: 26px 22px 22px;
            position: relative;
        }

        /* ============ ГЛАЗ ============ */
        .icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
        }

        .icon-ring {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .icon-ring::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .icon-core {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.015);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-eye {
            width: 26px;
            height: 26px;
            color: var(--text-muted);
            opacity: 0.7;
        }

        /* ============ ИНФО ============ */
        .info-block {
            margin-bottom: 18px;
        }

        .info-line {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;
            font-size: 11px;
            letter-spacing: 0.03em;
        }

        .info-line .lbl {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 9px;
            letter-spacing: 0.07em;
            min-width: 55px;
            flex-shrink: 0;
        }

        .info-line .sep {
            color: var(--border-light);
            flex-shrink: 0;
        }

        .info-line .val {
            color: var(--text-secondary);
            word-break: break-all;
        }

        .info-line .val.muted {
            color: var(--text-muted);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 14px 0;
        }

        /* ============ КНОПКА ============ */
        .btn-wrap {
            margin-top: 6px;
        }

        .btn-dark {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 18px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .btn-dark::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.015);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .btn-dark:hover {
            background: var(--surface-hover);
            border-color: var(--border-light);
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .btn-dark:hover::after {
            opacity: 1;
        }

        .btn-dark:active {
            background: #1a2027;
            transition: all 0.05s ease;
        }

        .btn-arrow {
            font-size: 14px;
            transition: transform var(--transition);
            opacity: 0.5;
        }

        .btn-dark:hover .btn-arrow {
            transform: translateX(2px);
            opacity: 0.8;
        }

        .btn-icon-svg {
            width: 14px;
            height: 14px;
            opacity: 0.5;
            flex-shrink: 0;
        }

        .btn-dark:hover .btn-icon-svg {
            opacity: 0.75;
        }

        /* ============ ПОДСКАЗКА ============ */
        .hint-text {
            text-align: center;
            margin-top: 14px;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
            opacity: 0.6;
        }

        /* ============ FOOTER ============ */
        .card-footer {
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 9px;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .footer-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
        }

        /* ============ ВНЕШНИЙ ФУТЕР ============ */
        .outer-footer {
            text-align: center;
            margin-top: 14px;
            font-size: 9px;
            letter-spacing: 0.07em;
            color: var(--text-dim);
            opacity: 0.3;
            text-transform: uppercase;
        }

        /* ============ ЧАСТИЦЫ ============ */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }

        .particle {
            position: absolute;
            width: 1.5px;
            height: 1.5px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            animation: drift linear infinite;
            opacity: 0;
        }

        @keyframes drift {
            0% {
                transform: translateY(105vh) translateX(0) scale(0);
                opacity: 0;
            }
            8% {
                opacity: 0.5;
            }
            40% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-10vh) translateX(30px) scale(1.5);
                opacity: 0;
            }
        }

        /* ============ АДАПТИВ ============ */
        @media (max-width: 480px) {
            .card-body {
                padding: 20px 14px 16px;
            }
            .card-header {
                padding: 10px 12px;
            }
            .card-footer {
                padding: 8px 12px;
            }
            .info-line {
                font-size: 10px;
            }
            .info-line .lbl {
                font-size: 8px;
                min-width: 45px;
            }
            .btn-dark {
                font-size: 12px;
                padding: 11px 14px;
            }
            .icon-ring {
                width: 64px;
                height: 64px;
            }
            .icon-core {
                width: 42px;
                height: 42px;
            }
            .icon-eye {
                width: 22px;
                height: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- Фон -->
    <div class="bg-grid"></div>
    <div class="bg-noise"></div>

    <!-- Частицы -->
    <div class="particles" id="particlesContainer"></div>

    <!-- Карточка -->
    <div class="container">
        <div class="card" id="card">
            <!-- Header -->
            <div class="card-header">
                <span class="header-dot"></span>
                <span class="header-label">Secure channel</span>
                <span class="header-spacer"></span>
                <span class="header-badge">TLS 1.3</span>
            </div>

            <!-- Body -->
            <div class="card-body">
                <!-- Глаз -->
                <div class="icon-wrap">
                    <div class="icon-ring">
                        <div class="icon-core">
                            <!-- SVG глаз -->
                            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Инфо -->
                <div class="info-block">
                    <div class="info-line">
                        <span class="lbl">target</span><span class="sep">:</span>
                        <span class="val muted">t.me/famIist/</span><span class="val">[...]</span>
                    </div>
                    <div class="info-line">
                        <span class="lbl">gateway</span><span class="sep">:</span>
                        <span class="val">osint-web</span><span class="sep">.</span><span class="val">manus.space</span>
                    </div>
                    <div class="info-line">
                        <span class="lbl">protocol</span><span class="sep">:</span>
                        <span class="val">HTTPS</span><span class="sep"> // </span><span class="val muted">Onion</span>
                    </div>
                    <div class="info-line">
                        <span class="lbl">node</span><span class="sep">:</span>
                        <span class="val" id="nodeId">—</span>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Кнопка -->
                <div class="btn-wrap">
                    <a href="https://t.me/your_channel_username"
                    class="btn-dark"
                    id="redirectBtn">
                    <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" y1="2" x2="12" y2="15"/>
                    </svg>
                    Open Channel
                    <span class="btn-arrow">→</span>
                </a>
            </div>

            <p class="hint-text">Click to establish connection</p>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <div class="footer-left">
                <span class="footer-dot"></span>
                <span>Idle</span>
            </div>
            <span>SESSION: <span id="sessionId">—</span></span>
        </div>
    </div>

    <div class="outer-footer">
        OSINT Gateway // Dark Channel
    </div>
</div>

<script>
    (function() {
        // ==================== НАСТРОЙКИ ====================
        const TELEGRAM_LINK = 'https://t.me/famIist';
        // ===================================================

        // Установка ссылки
        document.getElementById('redirectBtn').href = TELEGRAM_LINK;

        // Генерация данных
        function randHex(len) {
            const c = '0123456789abcdef';
            let r = '';
            for (let i = 0; i < len; i++) r += c[Math.floor(Math.random() * c.length)];
            return r;
        }
        document.getElementById('sessionId').textContent = randHex(8).toUpperCase();
        document.getElementById('nodeId').textContent =
            'node_' + randHex(4) + '::' + randHex(4);

        // ==================== ЧАСТИЦЫ ====================
        const particlesLayer = document.getElementById('particlesContainer');

        function spawnParticle() {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 2 + 0.8;
            const left = Math.random() * 95;
            const dur = Math.random() * 16 + 10;
            const delay = Math.random() * 5;
            p.style.cssText = `
                        left: ${left}%;
                        width: ${size}px;
                        height: ${size}px;
                        animation-duration: ${dur}s;
                        animation-delay: ${delay}s;
                    `;
            particlesLayer.appendChild(p);
            setTimeout(() => {
                if (p.parentNode) p.parentNode.removeChild(p);
            }, (dur + delay) * 1000);
        }
        setInterval(spawnParticle, 900);
        for (let i = 0; i < 10; i++) setTimeout(spawnParticle, i * 400);

        // ==================== 3D-НАКЛОН КАРТОЧКИ ====================
        const card = document.getElementById('card');
        card.addEventListener('mousemove', function(e) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            const rotX = ((y - cy) / cy) * -2.5;
            const rotY = ((x - cx) / cx) * 2.5;
            card.style.transform =
                `perspective(700px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            card.style.transition = 'transform 0.08s ease-out';
        });
        card.addEventListener('mouseleave', function() {
            card.style.transform = 'perspective(700px) rotateX(0deg) rotateY(0deg)';
            card.style.transition = 'transform 0.4s ease';
        });

        // ==================== КЛИК-ВСПЫШКА ====================
        card.addEventListener('click', function() {
            const flash = document.createElement('div');
            flash.style.cssText = `
                        position: fixed;
                        inset: 0;
                        background: rgba(255, 255, 255, 0.01);
                        pointer-events: none;
                        z-index: 999;
                        animation: flashOut 0.3s ease-out forwards;
                    `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 300);
        });
        const styleEl = document.createElement('style');
        styleEl.textContent =
            '@keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }';
        document.head.appendChild(styleEl);

        console.log(
            '%c[gateway]%c idle • session: ' + randHex(8).toUpperCase(),
            'color: #5a626b;',
            'color: #8b939c;'
        );
    })();
</script>
</body>
</html>
